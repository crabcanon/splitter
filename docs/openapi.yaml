openapi: 3.1.0
info:
  title: Universal Document Parsing & Splitting Gateway
  version: 0.1.0
  description: FastAPI service for splitting document content with automatic or explicit strategies.
servers:
  - url: http://localhost:8000
tags:
  - name: Health
  - name: Strategies
  - name: Split
paths:
  /healthz:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthz
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v1/strategies:
    get:
      tags: [Strategies]
      summary: List available splitter strategies
      operationId: listStrategies
      responses:
        "200":
          description: Available strategy descriptors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StrategiesResponse"
  /api/v1/split:
    post:
      tags: [Split]
      summary: Split document content into standard nodes
      operationId: splitDocument
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SplitRequest"
            examples:
              simpleFile:
                summary: SimpleFileNodeParser
                description: 通用纯文本内容解析。
                value:
                  content: "Project notes\n\nGoal: simplify the split API.\n\nOutcome: return standard nodes."
                  mode: SimpleFileNodeParser
              html:
                summary: HTMLNodeParser
                description: HTML 文档结构解析。
                value:
                  content: "<html><body><h1>Release Notes</h1><p>Splitter now accepts content and mode.</p></body></html>"
                  mode: HTMLNodeParser
              json:
                summary: JSONNodeParser
                description: JSON 内容解析。
                value:
                  content: '{"service":"splitter","version":"0.1.0","features":["auto","strategy"]}'
                  mode: JSONNodeParser
              markdown:
                summary: MarkdownNodeParser
                description: Markdown 标题与段落解析。
                value:
                  content: "# Intro\n\nSplitter accepts raw content.\n\n## Details\nUse mode to choose a strategy."
                  mode: MarkdownNodeParser
              code:
                summary: CodeSplitter
                description: Python 代码切分。
                value:
                  content: "from typing import Iterable\n\n\ndef chunks(items: Iterable[str]) -> list[str]:\n    return [item.strip() for item in items if item.strip()]\n"
                  mode: CodeSplitter
              langchain:
                summary: LangchainNodeParser
                description: 使用 LangChain RecursiveCharacterTextSplitter。
                value:
                  content: "LangChain compatible splitting is useful for long prose. This paragraph gives the splitter enough natural language text to produce a reusable node. A second paragraph explains that recursive splitting tries larger separators first. A third paragraph keeps the sample long enough to show multiple chunks in Swagger."
                  mode: LangchainNodeParser
              chunker:
                summary: Chunker
                description: Chonkie 递归切块。
                value:
                  content: "Chunker can split dense documents into recursive chunks. It walks through delimiter levels and keeps chunks near the configured size. This sample is intentionally longer so the result is easier to inspect in Swagger. Each sentence gives the recursive chunker another place to divide the content."
                  mode: Chunker
              sentence:
                summary: SentenceSplitter
                description: 普通自然语言句子切分。
                value:
                  content: "Splitter exposes a compact API. The service chooses or runs a parser. The response contains normalized nodes. 中文内容也应该按照句号切分。这第二个中文句子用于验证自然语言切分。最后一个句子让样例更容易产生多个节点。"
                  mode: SentenceSplitter
              sentenceWindow:
                summary: SentenceWindowNodeParser
                description: 带上下文窗口的句子节点。
                value:
                  content: "The first sentence introduces the topic. The second sentence adds supporting context. The third sentence gives a conclusion."
                  mode: SentenceWindowNodeParser
              semantic:
                summary: SemanticSplitterNodeParser
                description: 语义切分；配置 SPLITTER_EMBEDDING_* 时使用真实 embedding，否则使用本地 MockEmbedding 方便验证。
                value:
                  content: "Search systems need coherent chunks for retrieval. Embedding based splitters can identify topic changes. Deployment teams also need clear operational docs. A separate section discusses API examples and local smoke tests."
                  mode: SemanticSplitterNodeParser
              token:
                summary: TokenTextSplitter
                description: 按 token 窗口切分。
                value:
                  content: "one two three four five six seven eight nine ten eleven twelve thirteen fourteen fifteen sixteen seventeen eighteen nineteen twenty twenty-one twenty-two twenty-three twenty-four twenty-five twenty-six twenty-seven twenty-eight twenty-nine thirty"
                  mode: TokenTextSplitter
              hierarchical:
                summary: HierarchicalNodeParser
                description: 生成父子层级节点。
                value:
                  content: "# Architecture\n\nThe API layer validates requests.\n\n## Services\n\nThe orchestrator selects strategies.\n\n## Strategies\n\nAdapters normalize framework nodes."
                  mode: HierarchicalNodeParser
      responses:
        "200":
          description: Split result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SplitResponse"
        "400":
          description: Bad request or domain error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required: [status, service, version]
      properties:
        status:
          type: string
          enum: [ok]
        service:
          type: string
        version:
          type: string
    SplitterType:
      type: string
      enum:
        - SimpleFileNodeParser
        - HTMLNodeParser
        - JSONNodeParser
        - MarkdownNodeParser
        - CodeSplitter
        - LangchainNodeParser
        - Chunker
        - SentenceSplitter
        - SentenceWindowNodeParser
        - SemanticSplitterNodeParser
        - TokenTextSplitter
        - HierarchicalNodeParser
    SplitRequest:
      type: object
      required: [content]
      additionalProperties: false
      properties:
        content:
          type: string
          minLength: 1
          description: Raw document content to split.
        mode:
          anyOf:
            - type: string
              enum: [auto]
            - $ref: "#/components/schemas/SplitterType"
          default: auto
          description: Use `auto` for automatic routing, or pass a strategy name.
    StandardNode:
      type: object
      required: [node_id, text, metadata, relationships, hash]
      properties:
        node_id:
          type: string
        text:
          type: string
        metadata:
          type: object
          additionalProperties: true
        relationships:
          type: object
          additionalProperties: true
        start_char_idx:
          type: [integer, "null"]
          minimum: 0
        end_char_idx:
          type: [integer, "null"]
          minimum: 0
        hash:
          type: string
    SplitResponse:
      type: object
      required:
        - status
        - request_id
        - mode_used
        - strategy_applied
        - total_nodes
        - nodes
        - processing_time_ms
      properties:
        status:
          type: string
          enum: [ok]
        request_id:
          type: string
        mode_used:
          type: string
          description: The input mode used by the request.
        strategy_applied:
          $ref: "#/components/schemas/SplitterType"
        total_nodes:
          type: integer
          minimum: 0
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/StandardNode"
        processing_time_ms:
          type: number
    StrategyDescriptor:
      type: object
      required: [name, family, description, backend]
      properties:
        name:
          $ref: "#/components/schemas/SplitterType"
        family:
          type: string
        description:
          type: string
        backend:
          type: string
    StrategiesResponse:
      type: object
      required: [strategies]
      properties:
        strategies:
          type: array
          items:
            $ref: "#/components/schemas/StrategyDescriptor"
    ErrorDetail:
      type: object
      required: [code, message, request_id]
      properties:
        code:
          type: string
        message:
          type: string
        request_id:
          type: string
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/ErrorDetail"
